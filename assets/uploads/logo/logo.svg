<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Definitions for custom modern geometric sans-serif styling -->
  <defs>
    <style>
      .brand-text {
        font-family: 'Montserrat', 'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        dominant-baseline: central;
        text-anchor: middle;
      }
      .urban {
        fill: #FFFFFF;
      }
      .bites {
        fill: #C62828;
      }
    </style>
  </defs>

  <!-- Transparent Background (No rect fill) -->

  <!-- Horizontal Logo Layout -->
  <g transform="translate(250, 60)">
    <text class="brand-text" font-size="54">
      <tspan class="urban" dx="-10">URBAN</tspan>
      <tspan class="bites" dx="20">BITES</tspan>
    </text>
  </g>
</svg>
